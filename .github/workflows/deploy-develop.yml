name: Build and Publish Docker Image
on:
  repository_dispatch:
    types: [build-and-publish-docker-front]

jobs:
  dowlonad-artifact-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read  

    steps:
       - run: echo ${{ github.event.client_payload.checksum }}
       - name: Retrieve Payload
         run: |
           echo ${{ github.event.client_payload.checksum }}

       - uses: actions/checkout@v4        
         if: success()
       - run: |
           echo print the current directory show files
           ls -la
           echo preparing docker build context
           mkdir -p /tmp/dockerBuildContext
           cp .docker/Dockerfile /tmp/dockerBuildContext/Dockerfile
           cp package.json /tmp/dockerBuildContext/package.json
           cp package-lock.json /tmp/dockerBuildContext/package-lock.json
           cp index.html /tmp/dockerBuildContext/index.html
           cp vite.config.js /tmp/dockerBuildContext/vite.config.js
           cp -r src /tmp/dockerBuildContext/src
           cp -r public /tmp/dockerBuildContext/public
           ls -la /tmp/dockerBuildContext

       - name: Upload artifact       
         uses: actions/upload-artifact@v4
         with:
          name: dockerBuildContext
          path: |
            /tmp/dockerBuildContext/
            
  docker-job:
    needs: dowlonad-artifact-job
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dockerBuildContext
          path: ./dockerBuildContext

      - name: Display structure of downloaded files
        run: ls -R dockerBuildContext

      - name: Prepare flat build context
        run: |
          mkdir -p flat-build-context
          DOCKERFILE_PATH=$(find dockerBuildContext -type f -name Dockerfile | head -n 1)
          PACKAGE_JSON_PATH=$(find dockerBuildContext -type f -name package.json | head -n 1)
          PACKAGE_LOCK_PATH=$(find dockerBuildContext -type f -name package-lock.json | head -n 1)
          INDEX_HTML_PATH=$(find dockerBuildContext -type f -name index.html | head -n 1)
          VITE_CONFIG_PATH=$(find dockerBuildContext -type f -name vite.config.js | head -n 1)
          SRC_PATH=$(find dockerBuildContext -type d -name src | head -n 1)
          PUBLIC_PATH=$(find dockerBuildContext -type d -name public | head -n 1)

          if [ -z "$DOCKERFILE_PATH" ] || [ -z "$PACKAGE_JSON_PATH" ] || [ -z "$PACKAGE_LOCK_PATH" ] || [ -z "$INDEX_HTML_PATH" ] || [ -z "$VITE_CONFIG_PATH" ] || [ -z "$SRC_PATH" ]; then
            echo "Missing required files for React Docker build context"
            exit 1
          fi

          cp "$DOCKERFILE_PATH" flat-build-context/Dockerfile
          cp "$PACKAGE_JSON_PATH" flat-build-context/package.json
          cp "$PACKAGE_LOCK_PATH" flat-build-context/package-lock.json
          cp "$INDEX_HTML_PATH" flat-build-context/index.html
          cp "$VITE_CONFIG_PATH" flat-build-context/vite.config.js
          cp -r "$SRC_PATH" flat-build-context/src

          if [ -n "$PUBLIC_PATH" ]; then
            cp -r "$PUBLIC_PATH" flat-build-context/public
          fi

          ls -la flat-build-context

      - name: Build and push image using action
        uses: docker/build-push-action@v4
        with:
          context: ./flat-build-context
          file: ./flat-build-context/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner}}/unir-test-tfm-front:${{ github.sha }}       